<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Dashboards - ME 2026</title>
    <style>
        /* Estilo Base */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f1117; 
            color: #fff; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
        }

        h1 { 
            color: #60a5fa; 
            margin-bottom: 10px; 
            font-size: 2.5rem;
        }

        p.subtitle { 
            color: #94a3b8; 
            margin-bottom: 40px; 
            font-size: 1.1rem;
        }

        /* Container dos Botões */
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            flex-wrap: wrap; 
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Estilo dos Cards/Botões */
        .card { 
            background: #161b27; 
            padding: 40px 20px; 
            border-radius: 20px; 
            border: 1px solid #2d3748;
            text-decoration: none; 
            color: #fff; 
            width: 240px; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Efeito de Hover */
        .card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-8px); 
            background: #1e2533;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.2);
        }

        .card h2 { 
            margin: 0 0 10px 0; 
            font-size: 1.5rem;
            color: #fff;
        }

        .card p { 
            margin: 0;
            color: #94a3b8; 
            font-size: 0.95rem;
        }

        /* Rodapé simples */
        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <h1>Painéis de Controle ME 2026</h1>
    <p class="subtitle">Selecione o dashboard que deseja visualizar:</p>
    
    <div class="container">
        <a href="saude.html" class="card">
            <h2>Saúde</h2>
            <p>Operadoras de Saúde</p>
        </a>

        <a href="alimentacao.html" class="card">
            <h2>Alimentação</h2>
            <p>Vale Alimentação</p>
        </a>

        <a href="transporte.html" class="card">
            <h2>Transporte</h2>
            <p>Vale Transporte</p>
        </a>
    </div>

    <div class="footer">
        © 2026 Gestão de Benefícios - Atualizado via VBA
    </div>

</body>
</html>
